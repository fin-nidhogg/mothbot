<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign in · Mothbot Admin</title>
    <link rel="stylesheet" href="/admin-assets/styles.css">
    <link rel="stylesheet" href="/admin-assets/login.css">
</head>

<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <div class="login-mark">M</div>
            <div class="eyebrow">Mothbot administration</div>
            <h1>Welcome back</h1>
            <p>Sign in to manage scheduled Discord messages.</p>
            <form id="loginForm"><label>Username<input id="username" name="username" autocomplete="username" required
                        autofocus></label><label>Password<input id="password" name="password" type="password"
                        autocomplete="current-password" required></label>
                <p class="login-error" id="loginError" role="alert"></p><button type="submit" class="primary"
                    id="loginButton">Sign in</button>
            </form>
        </section>
    </main>
    <script src="/admin-assets/login.js" defer></script>
</body>

</html>
